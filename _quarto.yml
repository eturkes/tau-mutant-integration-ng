project:
  type: default
  output-dir: report
  render:
    - index.qmd      # the ONE report; underscored qmd fragments pull in via {{< include >}} and never render standalone

lang: en-GB

execute:
  # targets owns caching/invalidation -> disable Quarto's separate freeze layer so a render
  # always recomputes from current inputs (a fresh clone lacks gitignored _freeze/; freeze:auto
  # could reuse stale local results AND let a targets-triggered re-render skip re-execution).
  freeze: false
