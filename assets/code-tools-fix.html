<!--
  Repairs the code-tools "Show All Code" / "Hide All Code" menu items.

  Quarto 1.9.38's stock after-body handler (quarto-html-after-body.ejs) toggles every
  folded chunk with the selector `.cell > details > .sourceCode`, expecting `.sourceCode`
  to be a DIRECT child of the `<details>`. But the code-copy feature wraps `.sourceCode`
  in a `div.code-copy-outer-scaffold`, so the real nesting is
  `.cell > details.code-fold > .code-copy-outer-scaffold > .sourceCode` -> the direct-child
  selector matches 0 of our 37 folds and both buttons are inert (they bind, then iterate an
  empty NodeList). Re-bind them to toggle `details.code-fold` directly, which is stable
  regardless of the copy scaffold. Inline + dependency-free -> safe under embed-resources
  (the single offline HTML fetches nothing). The stock listeners stay attached but no-op.
-->
<script>
  (function () {
    function setAllCode(open) {
      document.querySelectorAll("details.code-fold").forEach(function (d) {
        if (open) { d.open = true; } else { d.removeAttribute("open"); }
      });
    }
    function bind() {
      var show = document.getElementById("quarto-show-all-code");
      var hide = document.getElementById("quarto-hide-all-code");
      if (show) { show.addEventListener("click", function () { setAllCode(true); }); }
      if (hide) { hide.addEventListener("click", function () { setAllCode(false); }); }
    }
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bind);
    } else {
      bind();
    }
  })();
</script>
